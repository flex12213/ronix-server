<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RONIX | ДЛЯ КОРЕШЕЙ 😎</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com""")/>>
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    
    <style>
        :root {
            --primary: #00f2fe;
            --accent: #4facfe;
            --bg: #020617;
            --card-bg: rgba(15, 23, 42, 0.9);
        }

        body {
            background: var(--bg);
            background-image: radial-gradient(circle at center, #1e293b 0%, #020617 100%);
            color: white;
            font-family: 'Montserrat', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 40px 20px;
        }

        .main-card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 40px;
            padding: 40px;
            text-align: center;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            margin-bottom: 25px;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 3.5rem;
            letter-spacing: 10px;
            background: linear-gradient(45deg, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0;
        }

        .status-badge {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            margin-top: 15px;
            background: rgba(0,0,0,0.5);
        }

        .online { color: #00ff88; text-shadow: 0 0 10px #00ff88; }
        .offline { color: #ef4444; }

        .player-count {
            font-family: 'Orbitron', sans-serif;
            font-size: 7rem;
            margin: 10px 0;
        }

        .button-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            width: 100%;
            max-width: 500px;
        }

        .action-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 18px;
            border-radius: 20px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            font-size: 14px;
        }

        .action-btn:hover {
            background: var(--primary);
            color: #000;
            transform: translateY(-3px);
        }

        .ip-btn {
            grid-column: span 2;
            background: rgba(0, 242, 254, 0.1);
            border-color: var(--primary);
            color: var(--primary);
            font-family: monospace;
            font-size: 16px;
        }

        /* Окна с инфой */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 100;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(15px);
        }

        .modal-content {
            background: #1e293b;
            padding: 35px;
            border-radius: 30px;
            max-width: 400px;
            width: 85%;
            border: 1px solid var(--primary);
            text-align: center;
        }

        .show { display: flex; }
    </style>
</head>
<body>

    <div class="main-card animate__animated animate__fadeInDown">
        <p style="font-size: 10px; letter-spacing: 5px; color: #64748b;">SERVER FOR FRIENDS</p>
        <h1>RONIX</h1>
        <div id="status" class="status-badge offline">● ПРОВЕРКА...</div>
        <div class="player-count" id="pCount">0</div>
        <p style="color: #64748b; font-size: 12px;">ТЕЛ ПРЯМО СЕЙЧАС</p>
    </div>

    <div class="button-grid animate__animated animate__fadeInUp">
        <div class="action-btn ip-btn" onclick="copyIP()" id="ipDisplay">ronix.aternos.me:18034</div>
        <div class="action-btn" onclick="openModal('rules')">🚫 НЕ ГРИФЕРИТЬ</div>
        <div class="action-btn" onclick="openModal('start')">🚀 КАК ЗАЙТИ?</div>
        <div class="action-btn" onclick="openModal('admin')">👑 АДМИН</div>
        <div class="action-btn" onclick="window.open('https://discord.gg', '_blank')">📱 ДИСКОРД</div>
    </div>

    <div id="modal" class="modal" onclick="closeModal()">
        <div class="modal-content animate__animated animate__bounceIn" onclick="event.stopPropagation()">
            <h2 id="modalTitle" style="color: var(--primary); margin-bottom: 15px;">Инфо</h2>
            <p id="modalBody" style="line-height: 1.5; color: #cbd5e1; font-size: 15px;"></p>
            <button onclick="closeModal()" style="margin-top: 25px; background: var(--primary); border: none; padding: 10px 20px; border-radius: 10px; cursor: pointer; font-weight: bold;">ПОНЯЛ</button>
        </div>
    </div>

    <script>
        const IP = 'ronix.aternos.me:18034';
        
        const info = {
            rules: {
                title: "🚫 БАЗАР ПО ПРАВИЛАМ",
                body: "1. Своих не трогаем!<br>2. Админа не бесить.<br>3. Не лагать (по возможности).<br>4. Если снёс чужой дом — чини сам!"
            },
            start: {
                title: "🚀 РАЗВЕРТЫВАНИЕ",
                body: "Сервер на Атерносе, так что если он оффлайн — пиши в личку админу, чтобы врубил. Версия последняя, заходи и летай!"
            },
            admin: {
                title: "👑 ГЛАВНЫЙ ТУТ",
                body: "По всем вопросам (включить серв, выдал бан по ошибке, застрял в текстурах) — пиши мне. Я не кусаюсь, но ресурсы просто так не дам!"
            }
        };

        async function update() {
            try {
                const res = await fetch(`https://api.mcstatus.io{IP}`);
                const data = await res.json();
                const status = document.getElementById('status');
                const count = document.getElementById('pCount');

                if(data.online) {
                    status.innerHTML = "● ONLINE";
                    status.className = "status-badge online";
                    count.innerText = data.players.online;
                    count.style.color = "#00ff88";
                } else {
                    status.innerHTML = "● OFFLINE";
                    status.className = "status-badge offline";
                    count.innerText = "0";
                    count.style.color = "#ef4444";
                }
            } catch(e) { console.log("API Error"); }
        }

        function openModal(type) {
            document.getElementById('modalTitle').innerHTML = info[type].title;
            document.getElementById('modalBody').innerHTML = info[type].body;
            document.getElementById('modal').classList.add('show');
        }

        function closeModal() { document.getElementById('modal').classList.remove('show'); }

        function copyIP() {
            navigator.clipboard.writeText(IP);
            const btn = document.getElementById('ipDisplay');
            btn.innerText = "СКОПИРОВАЛ! 😎";
            setTimeout(() => btn.innerText = IP, 2000);
        }

        update();
        setInterval(update, 20000);
    </script>
</body>
</html>
